<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno - Lab 1</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .inline-label { display: inline; font-weight: normal; }
        fieldset { border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; }
        .hint { font-size: 0.85em; color: #666; display: block; }
    </style>
</head>
<body>

    <h1>Cadastro de Aluno</h1>

    <form action="#" method="post">
        <div>
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div>
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="cpf">CPF</label>
            <input type="text" 
                   id="cpf" 
                   name="cpf" 
                   inputmode="numeric" 
                   pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" 
                   aria-describedby="cpf-hint" 
                   placeholder="000.000.000-00"
                   required>
            <span id="cpf-hint" class="hint">Formato: 000.000.000-00</span>
        </div>

        <div>
            <label for="nascimento">Data de Nascimento</label>
            <input type="date" id="nascimento" name="nascimento" required>
        </div>

        <div>
            <label for="curso">Curso</label>
            <select id="curso" name="curso" required>
                <option value="">Selecione um curso...</option>
                <option value="ads">Análise e Desenvolvimento de Sistemas</option>
                <option value="si">Sistemas de Informação</option>
                <option value="ge">Gestão Empresarial</option>
            </select>
        </div>

        <fieldset>
            <legend>Turno</legend>
            <input type="radio" id="manha" name="turno" value="manha" checked>
            <label for="manha" class="inline-label">Manhã</label>

            <input type="radio" id="tarde" name="turno" value="tarde">
            <label for="tarde" class="inline-label">Tarde</label>

            <input type="radio" id="noite" name="turno" value="noite">
            <label for="noite" class="inline-label">Noite</label>
        </fieldset>

        <div>
            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos" class="inline-label">Aceito os termos e condições</label>
        </div>

        <div>
            <button type="submit">Enviar Cadastro</button>
            <button type="reset">Limpar Formulário</button>
        </div>
    </form>

</body>
</html>
